<!DOCTYPE html>
<html>
<head>
    <title>Zane - Auth Test Bench</title>
    <style>body { font-family: sans-serif; padding: 20px; } button { margin: 5px; padding: 10px; cursor: pointer; }</style>
</head>
<body>
    <h2>Project Zane: Auth & SCD Type 2 Tester</h2>
    
    <div>
        <h3>1. SSO Flow</h3>
        <button onclick="getSSOUrl()">Get Login URL</button>
        <div id="ssoLink"></div>
    </div>

    <hr>

    <div>
        <h3>2. Local Login (Enforcement Test)</h3>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="localLogin()">Login (Local)</button>
    </div>

    <hr>

    <div>
        <h3>3. Check Results</h3>
        <pre id="output" style="background: #eee; padding: 10px;"></pre>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        async function getSSOUrl() {
            const res = await fetch(`${API}/sso/login`);
            const data = await res.json();
            document.getElementById('ssoLink').innerHTML = `<a href="${data.login_url}">Click here to Login with Microsoft</a>`;
        }

        async function localLogin() {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('user').value, password: document.getElementById('pass').value})
            });
            const data = await res.json();
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
